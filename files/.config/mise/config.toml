[tools]
# Windows でも使うもの
bun = "latest"
gh = "latest"
jq = "latest"
node = "latest"
uv = "latest"
git-lfs = "latest"
bitwarden = "latest"

# Windows では不要 / 非対応 (mac/linux のみ。Windows は choco の awscli を使う)
awscli = { version = "latest", symlink_bins = "true", os = ["linux", "macos"] }
duckdb = { version = "latest", os = ["linux", "macos"] }
ecspresso = { version = "latest", os = ["linux", "macos"] }
fzf = { version = "latest", os = ["linux", "macos"] }
python = { version = "latest", os = ["linux", "macos"] }
redis = { version = "latest", os = ["linux", "macos"] }
ripgrep = { version = "latest", os = ["linux", "macos"] }

# macOS 専用
"aqua:mas-cli/mas" = { version = "latest", os = ["macos"] }

# Windows 専用 (choco から移行)
protoc = { version = "latest", os = ["windows"] }
java = { version = "temurin-21", os = ["windows"] }

[settings]
python.github_attestations = false
