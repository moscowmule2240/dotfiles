[tools]
awscli = { version = "latest", symlink_bins = "true" }
bun = "latest"
# direnv / redis / mas は Windows で動かないため os で限定 (mac/linux のみ)
direnv = { version = "latest", os = ["linux", "macos"] }
duckdb = "latest"
ecspresso = "latest"
gh = "latest"
jq = "latest"
node = "latest"
python = "latest"
uv = "latest"
fzf = "latest"
git-lfs = "latest"
redis = { version = "latest", os = ["linux", "macos"] }
"aqua:mas-cli/mas" = { version = "latest", os = ["macos"] }
ripgrep = "latest"
bitwarden = "latest"

[settings]
python.github_attestations = false
